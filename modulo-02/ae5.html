<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bases de JavaScript - Clase Interactiva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2D5BFF;
            --secondary: #00D4AA;
            --accent: #FF6B6B;
            --dark: #1A1A2E;
            --light: #F8F9FA;
            --warning: #FFA500;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #0F0F1E 100%);
            color: var(--light);
            overflow: hidden;
            height: 100vh;
        }

        .presentation-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(45, 91, 255, 0.3);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .slide-counter {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            color: var(--secondary);
            text-shadow: 0 0 10px rgba(0, 212, 170, 0.5);
        }

        .progress-container {
            flex: 1;
            max-width: 600px;
            margin: 0 3rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
        }

        .slides-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.6s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            text-align: center;
            line-height: 1.2;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 1rem;
            text-align: center;
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.8rem;
        }

        p, li {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 0.6rem;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        ul li {
            padding-left: 2rem;
            position: relative;
        }

        ul li:before {
            content: "▹";
            position: absolute;
            left: 0;
            color: var(--secondary);
            font-weight: bold;
            font-size: 1.5rem;
        }

        ol {
            padding-left: 1.5rem;
        }

        ol li {
            padding-left: 0.3rem;
        }

        .two-column-list {
            column-count: 2;
            column-gap: 3rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            width: 100%;
            margin-top: 1.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 12px;
            border: 2px solid rgba(45, 91, 255, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(45, 91, 255, 0.3);
        }

        .code-block {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 1rem;
            margin: 0.8rem 0;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            max-height: 350px;
            overflow-y: auto;
        }

        .code-block code {
            color: var(--light);
            white-space: pre;
            display: block;
            line-height: 1.5;
        }

        .activity-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            width: 100%;
            align-items: start;
        }

        .timer-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 2px solid var(--primary);
            text-align: center;
        }

        .timer-display {
            font-family: 'Space Mono', monospace;
            font-size: 5rem;
            font-weight: 700;
            margin: 1rem 0;
            text-shadow: 0 0 20px rgba(0, 212, 170, 0.6);
            color: var(--secondary);
        }

        .timer-display.warning {
            color: var(--warning);
        }

        .timer-display.danger {
            color: var(--accent);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .timer-controls {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .timer-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .timer-btn.start {
            background: var(--secondary);
            color: var(--dark);
        }

        .timer-btn.pause {
            background: var(--warning);
            color: var(--dark);
        }

        .timer-btn.reset {
            background: var(--accent);
            color: white;
        }

        .timer-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .timer-status {
            margin-top: 1rem;
            font-size: 1rem;
            color: var(--light);
        }

        .activity-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 12px;
            border: 2px solid rgba(0, 212, 170, 0.3);
        }

        .activity-card h3 {
            color: var(--secondary);
            margin-bottom: 1rem;
        }

        .activity-card ul, .activity-card ol {
            margin-top: 0.8rem;
        }

        .navigation {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-top: 2px solid rgba(45, 91, 255, 0.3);
        }

        .nav-btn {
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 91, 255, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .highlight {
            color: var(--secondary);
            font-weight: 600;
        }

        .break-slide {
            text-align: center;
        }

        .break-slide h1 {
            font-size: 5rem;
            margin-bottom: 2rem;
        }

        .break-timer {
            font-family: 'Space Mono', monospace;
            font-size: 6rem;
            color: var(--secondary);
            text-shadow: 0 0 30px rgba(0, 212, 170, 0.8);
            margin: 2rem 0;
        }

        .objective-list {
            text-align: left;
            max-width: 900px;
            margin: 0 auto;
        }

        .demo-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            margin-left: 1rem;
        }

        .inline-code {
            background: rgba(45, 91, 255, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            color: var(--secondary);
            font-size: 1rem;
        }

        .comment {
            color: #6A9955;
        }

        .keyword {
            color: #569CD6;
        }

        .string {
            color: #CE9178;
        }

        .function {
            color: #DCDCAA;
        }
    </style>
</head>

        // Render slides
        const slidesContainer = document.getElementById('slidesContainer');
        slidesData.forEach((slideData, index) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide' + (index === 0 ? ' active' : '');
            slideDiv.innerHTML = `<div class="slide-content">${slideData.content}</div>`;
            slidesContainer.appendChild(slideDiv);
        });

        // JavaScript
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        
        const timers = {};
        const timerIntervals = {};
        
        document.getElementById('totalSlides').textContent = totalSlides;
        updateSlideCounter();
        updateProgress();
        updateNavButtons();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                changeSlide(1);
            }
        });

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide += direction;
            
            if (currentSlide >= totalSlides) currentSlide = 0;
            if (currentSlide < 0) currentSlide = totalSlides - 1;
            
            slides[currentSlide].classList.add('active');
            updateSlideCounter();
            updateProgress();
            updateNavButtons();
        }

        function updateSlideCounter() {
            document.getElementById('currentSlide').textContent = currentSlide + 1;
        }

        function updateProgress() {
            const progress = ((currentSlide + 1) / totalSlides) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function startTimer(timerId, minutes) {
            if (timerIntervals[timerId]) return;
            
            if (!timers[timerId]) {
                timers[timerId] = minutes * 60;
            }
            
            timerIntervals[timerId] = setInterval(() => {
                timers[timerId]--;
                updateTimerDisplay(timerId);
                
                if (timers[timerId] <= 0) {
                    clearInterval(timerIntervals[timerId]);
                    timerIntervals[timerId] = null;
                    document.getElementById(`status${timerId}`).textContent = '¡Tiempo completado!';
                }
            }, 1000);
        }

        function pauseTimer(timerId) {
            if (timerIntervals[timerId]) {
                clearInterval(timerIntervals[timerId]);
                timerIntervals[timerId] = null;
                document.getElementById(`status${timerId}`).textContent = 'Pausado';
            }
        }

        function resetTimer(timerId, minutes) {
            clearInterval(timerIntervals[timerId]);
            timerIntervals[timerId] = null;
            timers[timerId] = minutes * 60;
            updateTimerDisplay(timerId);
            document.getElementById(`status${timerId}`).textContent = 'Listo para comenzar';
        }

        function updateTimerDisplay(timerId) {
            const minutes = Math.floor(timers[timerId] / 60);
            const seconds = timers[timerId] % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            const timerElement = document.getElementById(`timer${timerId}`);
            timerElement.textContent = display;
            
            if (timers[timerId] <= 60) {
                timerElement.className = 'timer-display danger';
                document.getElementById(`status${timerId}`).textContent = '¡Último minuto!';
            } else if (timers[timerId] <= 300) {
                timerElement.className = 'timer-display warning';
                document.getElementById(`status${timerId}`).textContent = 'Menos de 5 minutos';
            } else {
                timerElement.className = 'timer-display';
                document.getElementById(`status${timerId}`).textContent = 'En progreso...';
            }
        }

        let breakTimer = 20 * 60;
        let breakInterval = null;

        function startBreak() {
            if (breakInterval) return;
            
            breakInterval = setInterval(() => {
                breakTimer--;
                updateBreakDisplay();
                
                if (breakTimer <= 0) {
                    clearInterval(breakInterval);
                    breakInterval = null;
                }
            }, 1000);
        }

        function resetBreak() {
            clearInterval(breakInterval);
            breakInterval = null;
            breakTimer = 20 * 60;
            updateBreakDisplay();
        }

        function updateBreakDisplay() {
            const minutes = Math.floor(breakTimer / 60);
            const seconds = breakTimer % 60;
            document.getElementById('breakTimer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    </script>
